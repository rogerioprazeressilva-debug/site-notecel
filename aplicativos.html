<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicativos | NOTECEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=1.0.2">
    <link rel="stylesheet" href="./output.css?v=1.0.1">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- Suporte UI -->
    <div id="toastContainer" class="fixed inset-0 flex items-center justify-center z-[200] pointer-events-none hidden">
        <div id="toastBox" class="bg-slate-900/95 backdrop-blur-xl p-8 rounded-[2rem] shadow-2xl border border-white/10 transform transition-all duration-300 scale-90 opacity-0 max-w-sm w-full text-center pointer-events-auto">
            <div id="toastIcon" class="mb-4"></div>
            <h3 id="toastTitle" class="text-xl font-black text-white uppercase italic mb-2"></h3>
            <p id="toastMessage" class="text-white font-medium leading-relaxed"></p>
            <button onclick="closeToast()" class="mt-6 w-full bg-red-700 text-white py-3 rounded-xl font-bold">Entendi</button>
        </div>
    </div>

    <nav class="glass sticky top-0 z-[100] border-b border-white/20 shadow-sm">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-slate-900 font-black text-2xl tracking-tighter flex items-center gap-2">
                <span class="bg-red-700 text-white px-2 py-0.5 rounded-lg shadow-sm">N</span>
                NOTECEL
            </a>
            <div class="hidden md:flex items-center gap-6 text-[12px] font-bold uppercase tracking-widest text-slate-600">
                <a href="index.html" class="hover:text-red-700 transition-all">Início</a>
                <a href="loja.html" class="hover:text-red-700 transition-all">Loja</a>
                <a href="aplicativos.html" class="text-red-700 transition-all">Aplicativos</a>
            </div>
            <div class="flex items-center gap-4">
                <div id="userArea" class="flex items-center gap-3">
                    <button id="userBtn" onclick="openAuthModal()" class="flex items-center gap-2 text-slate-600 hover:text-red-700 font-bold text-xs uppercase tracking-widest">
                        <i class="fa-regular fa-circle-user text-xl"></i>
                        <span id="userNameDisplay" class="hidden md:inline">Entrar</span>
                    </button>
                    <button id="historyBtn" onclick="openHistoryModal()" class="hidden text-slate-600 hover:text-red-700" title="Meus Pedidos"><i class="fa-solid fa-clock-rotate-left text-lg"></i></button>
                    <button id="logoutBtn" onclick="logout()" class="hidden text-slate-400 hover:text-red-600" title="Sair"><i class="fa-solid fa-right-from-bracket text-lg"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <header class="bg-slate-900 py-16 px-6">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="text-4xl font-black text-white uppercase tracking-tighter italic">Downloads</h1>
            <p class="text-slate-400 mt-2">Baixe os aplicativos recomendados para o seu dispositivo.</p>
        </div>
    </header>

    <main class="container mx-auto py-12 px-4">
        <div id="apps-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Apps carregados via JS -->
            <div class="animate-pulse col-span-full py-20 text-center">
                <div class="h-12 w-12 bg-slate-200 rounded-full mx-auto mb-4"></div>
                <p class="text-slate-400 font-bold uppercase tracking-widest">Carregando Aplicativos...</p>
            </div>
        </div>
    </main>

    <!-- Modal de Autenticação -->
    <div id="authModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-[150] p-4">
        <div class="bg-white rounded-[2rem] max-w-md w-full p-8 shadow-2xl relative">
            <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-slate-400">&times;</button>
            <div class="flex border-b mb-8">
                <button id="tabLogin" onclick="setAuthMode(false)" class="flex-1 pb-4 font-bold border-b-2 border-red-700 text-red-700 uppercase text-xs">Login</button>
                <button id="tabRegister" onclick="setAuthMode(true)" class="flex-1 pb-4 font-bold border-b-2 border-transparent text-slate-400 uppercase text-xs">Cadastro</button>
            </div>
            <form onsubmit="handleAuth(event)" class="space-y-4">
                <div id="registerFields" class="hidden space-y-4"><input type="text" id="regNome" placeholder="Nome" class="w-full px-4 py-3 rounded-xl border"></div>
                <input type="email" id="authEmail" placeholder="E-mail" class="w-full px-4 py-3 rounded-xl border">
                <input type="password" id="authPass" placeholder="Senha" class="w-full px-4 py-3 rounded-xl border">
                <button type="submit" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl">Confirmar</button>
            </form>
        </div>
    </div>

    <!-- Modal de Histórico -->
    <div id="historyModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-[150] p-4">
        <div class="bg-white rounded-[2rem] max-w-md w-full p-8 shadow-2xl relative flex flex-col max-h-[80vh]">
            <button onclick="closeHistoryModal()" class="absolute top-4 right-4 text-slate-400 hover:text-red-700 text-2xl">&times;</button>
            <h2 class="text-2xl font-black text-slate-900 mb-6 uppercase tracking-tighter italic">Meus Pedidos</h2>
            <div id="history-list" class="flex-1 overflow-y-auto pr-2"></div>
        </div>
    </div>

    <!-- Botão Flutuante do WhatsApp -->
    <a href="https://wa.me/5591985156039?text=Olá! Gostaria de saber mais sobre os serviços da Notecel." onclick="registrarLeadWhatsapp()" class="whatsapp-float" target="_blank" title="Fale conosco no WhatsApp">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script src="script.js?v=1.1.8"></script>
</body>
</html>
